services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 4000
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
