services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: ${PORT}
    expose:
      - ${PORT}

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - 3000
