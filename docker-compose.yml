services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      PORT: ${API_PORT:-4000}
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:${API_PORT:-4000}
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: ${WEB_HOSTNAME:-0.0.0.0}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
